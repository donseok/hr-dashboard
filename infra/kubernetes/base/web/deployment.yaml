apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: hr-dashboard
  labels:
    app: web
    app.kubernetes.io/part-of: hr-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/hr-dashboard/web:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: hr-dashboard-config
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://api:4000/graphql"
            - name: NEXT_PUBLIC_ML_API_URL
              value: "http://ml-service:8000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
