apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hr-dashboard
  namespace: hr-dashboard
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - hr-dashboard.example.com
      secretName: hr-dashboard-tls
  rules:
    - host: hr-dashboard.example.com
      http:
        paths:
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: ml-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
