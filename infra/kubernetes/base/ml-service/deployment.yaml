apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: hr-dashboard
  labels:
    app: ml-service
    app.kubernetes.io/part-of: hr-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: ghcr.io/hr-dashboard/ml-service:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: hr-dashboard-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hr-dashboard-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis:6379"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
