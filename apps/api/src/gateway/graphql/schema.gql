}

# ─── Queries ─────────────────────────────────────────────

type Query {
  # Auth
  me: AuthUser!

  # Workforce
  employees(filter: EmployeeFilterInput, pagination: PaginationInput): EmployeePaginated!
  employee(id: ID!): Employee!
  departments: [Department!]!
  department(id: ID!): Department!
  workforceDashboard(dateRange: DateRangeInput): WorkforceDashboard!
  headcountTrend(months: Int): [TrendPoint!]!
  turnoverAnalysis(dateRange: DateRangeInput): TurnoverAnalysis!
  orgStructure(departmentId: String): [OrgNode!]!

  # Recruitment
  requisitions(filter: RecruitmentFilterInput, pagination: PaginationInput): JobRequisitionPaginated!
  requisition(id: ID!): JobRequisition!
  candidates(pagination: PaginationInput): [Candidate!]!
  candidate(id: ID!): Candidate!
  recruitmentDashboard(dateRange: DateRangeInput): RecruitmentDashboard!
  recruitmentFunnel(requisitionId: ID, dateRange: DateRangeInput): [RecruitmentFunnelStage!]!
  channelEfficiency(dateRange: DateRangeInput): [ChannelEfficiency!]!
  timeToHireTrend(months: Int): [TrendPoint!]!

  # Performance
  performanceCycles: [PerformanceCycle!]!
  performanceCycle(id: ID!): PerformanceCycle!
  performanceReviews(cycleId: ID!, employeeId: ID): [PerformanceReview!]!
  performanceDashboard(cycleId: ID): PerformanceDashboard!
  ratingDistribution(cycleId: ID!): [RatingDistribution!]!
  nineBoxData(cycleId: ID!): [NineBoxCell!]!
  calibrationData(cycleId: ID!): CalibrationData!

  # Culture
  surveys(type: String): [Survey!]!
  survey(id: ID!): Survey!
  cultureDashboard: CultureDashboard!
  engagementTrend(months: Int): [TrendPoint!]!
  eNPSScore: Float!
  sentimentAnalysis(surveyId: ID): SentimentAnalysis!

  # Training / Development
  trainingPrograms(category: String): [TrainingProgram!]!
  trainingProgram(id: ID!): TrainingProgram!
  myEnrollments: [TrainingEnrollment!]!
  developmentDashboard: DevelopmentDashboard!
  skillGapAnalysis: [SkillGap!]!
  internalMobilityRate: Float!

  # DEI
  deiMetrics(dimension: String, period: String): [DeiMetric!]!
  deiDashboard: DeiDashboard!
  payEquityAnalysis(grade: String): [PayEquityItem!]!
  deiTrend(months: Int): [TrendPoint!]!

  # Lifecycle
  lifecycleDashboard: LifecycleDashboard!
  employeeJourney(employeeId: ID!): [JourneyStage!]!
  crossModuleAnalysis: [CrossModuleInsight!]!
  attritionCorrelation: [CorrelationItem!]!

  # KPI
  kpiSnapshots(kpiId: String, moduleType: String, period: String): [KpiSnapshot!]!
  latestKpis(moduleType: String): [KpiSnapshot!]!

  # Notifications
  notifications(unreadOnly: Boolean): [Notification!]!
  unreadNotificationCount: Int!
}

# ─── Mutations ───────────────────────────────────────────

type Mutation {
  # Auth
  login(input: LoginInput!): LoginResponse!
  refreshToken(refreshToken: String!): AuthTokens!

  # Recruitment
  createRequisition(input: CreateRequisitionInput!): JobRequisition!
  updateRequisitionStatus(id: ID!, status: String!): JobRequisition!
  updateApplication(input: UpdateApplicationInput!): Application!
  scheduleInterview(input: ScheduleInterviewInput!): Interview!
  makeOffer(input: MakeOfferInput!): Application!

  # Workforce
  updateEmployee(id: ID!, input: UpdateEmployeeInput!): Employee!
  transferEmployee(input: TransferEmployeeInput!): Employee!

  # Performance
  createCycle(input: CreateCycleInput!): PerformanceCycle!
  submitReview(reviewId: ID!, rating: String!, comments: String): PerformanceReview!
  calibrateRatings(input: CalibrateRatingsInput!): CalibrationData!

  # Culture
  createSurvey(input: CreateSurveyInput!): Survey!
  submitSurveyResponse(input: SubmitSurveyResponseInput!): SurveyResponse!

  # Development
  createProgram(input: CreateProgramInput!): TrainingProgram!
  enrollEmployee(input: EnrollEmployeeInput!): TrainingEnrollment!
  completeTraining(enrollmentId: ID!, score: Float): TrainingEnrollment!

  # DEI
  recordDeiMetric(input: RecordDeiMetricInput!): DeiMetric!

  # Notifications
  markNotificationRead(id: ID!): Notification!
  markAllNotificationsRead: Boolean!
}

# ─── Subscriptions ───────────────────────────────────────

type Subscription {
  notificationReceived: Notification!
  kpiUpdated(moduleType: String): KpiSnapshot!
}
