apiVersion: v1
kind: Secret
metadata:
  name: hr-dashboard-secrets
  namespace: hr-dashboard
type: Opaque
stringData:
  # Replace these values in each environment overlay or via sealed-secrets / external-secrets
  DATABASE_URL: "postgresql://hr_admin:CHANGE_ME@postgres:5432/hr_dashboard"
  JWT_SECRET: "CHANGE_ME_TO_A_SECURE_RANDOM_STRING"
  JWT_REFRESH_SECRET: "CHANGE_ME_TO_ANOTHER_SECURE_STRING"
  REDIS_PASSWORD: ""
