apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: hr-dashboard
  labels:
    app: api
    app.kubernetes.io/part-of: hr-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/hr-dashboard/api:latest
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: hr-dashboard-config
            - secretRef:
                name: hr-dashboard-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hr-dashboard-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hr-dashboard-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /graphql?query=%7B__typename%7D
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /graphql?query=%7B__typename%7D
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
